<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Booking Slot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Styling (asumsi Tailwind / custom CSS sudah tersedia) -->
    <style>
        .slot-button {
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 600;
            width: 100%;
        }
    </style>
</head>

<body class="bg-neutral-100 min-h-screen">

<div id="loginView">
    <form id="loginForm">
        <input type="text" id="uid" placeholder="User ID" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
    </form>
    <div id="errorMessage" class="hidden text-red-600"></div>
</div>

<div id="mainView" class="hidden">
    <button id="logoutBtn">Logout</button>
    <div id="slotsContainer"></div>
</div>

<script>
    // ================== GLOBAL STATE ==================
    let currentUser = null;
    let currentWeekStart = null;
    let slotsData = [];

    // ================== UTIL ==================
    function showView(viewId) {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('mainView').classList.add('hidden');
        document.getElementById(viewId).classList.remove('hidden');
    }

    function showError(message) {
        const el = document.getElementById('errorMessage');
        el.textContent = message;
        el.classList.remove('hidden');
    }

    function hideError() {
        const el = document.getElementById('errorMessage');
        el.textContent = '';
        el.classList.add('hidden');
    }

    async function apiCall(action, payload) {
        const response = await fetch('https://script.google.com/macros/s/AKfycby5a_EVhV12RFJLHXjQOlCQZe3shxKyETsAMlE3okvlfj-DslZD_yMEh2u5QdHxvtni/exec', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action,
                ...payload
            })
        });

        return response.json();
    }

    // ================== SLOT RENDER ==================
    function renderSlot(slot) {
        const container = document.createElement('div');
        container.className = 'p-2 space-y-2';

        // ===== ADMIN MODE =====
        if (currentUser.role === 'Admin') {
            const select = document.createElement('select');
            select.className = 'border p-1 w-full';

            const statuses = ['Available', 'Booked', 'Finish'];

            statuses.forEach((status) => {
                const option = document.createElement('option');
                option.value = status;
                option.textContent = status;

                if (status === slot.status) {
                    option.selected = true;
                }

                select.appendChild(option);
            });

            select.addEventListener('change', async (e) => {
                const newStatus = e.target.value;

                if (newStatus !== slot.status) {
                    await changeSlotStatus(slot.slotId, newStatus);
                }
            });

            // Add booking info for booked slots
            if (slot.bookedBy) {
                const info = document.createElement('div');
                info.className = 'text-xs text-neutral-600 px-2 py-1';
                info.textContent = `By: ${slot.bookedBy}`;
                container.appendChild(info);
            }

            container.appendChild(select);
        }
        // ===== USER MODE =====
        else {
            const button = document.createElement('button');
            button.className = 'slot-button';
            button.setAttribute('data-testid', `slot-${slot.slotId}`);

            if (slot.status === 'Available') {
                button.className += ' bg-white border-2 border-green-600 text-green-700 hover:bg-green-50';
                button.textContent = 'BOOK';
                button.addEventListener('click', () => {
                    bookSlot(slot.slotId);
                });
            } 
            else if (slot.status === 'Booked') {
                button.className += ' bg-red-50 border border-red-200 text-red-800 cursor-not-allowed';
                button.textContent =
                    slot.bookedBy === currentUser.uid
                        ? 'BOOKED (Anda)'
                        : 'BOOKED';
                button.disabled = true;
            } 
            else if (slot.status === 'Finish') {
                button.className += ' bg-blue-50 border border-blue-200 text-blue-800 cursor-not-allowed';
                button.textContent = 'FINISH';
                button.disabled = true;
            }

            container.appendChild(button);
        }

        return container;
    }

    // ================== BOOKING ACTION ==================
    async function bookSlot(slotId) {
        if (!confirm('Apakah Anda yakin ingin booking slot ini?')) {
            return;
        }

        const result = await apiCall('bookSlot', {
            uid: currentUser.uid,
            slotId
        });

        if (result && result.success) {
            alert('✓ ' + result.message);
            loadWeeklyData();
        } else {
            alert('✗ ' + (result?.message || 'Terjadi kesalahan'));
        }
    }

    // ================== ADMIN CHANGE STATUS ==================
    async function changeSlotStatus(slotId, newStatus) {
        const result = await apiCall('changeStatus', {
            uid: currentUser.uid,
            slotId,
            newStatus
        });

        if (result && result.success) {
            alert('✓ ' + result.message);
            loadWeeklyData();
        } else {
            alert('✗ ' + (result?.message || 'Terjadi kesalahan'));
        }
    }

    // ================== LOAD DATA ==================
    async function loadWeeklyData() {
        const result = await apiCall('getWeeklyStatus', {
            startDate: currentWeekStart
        });

        if (!result || !result.success) return;

        slotsData = result.slots;
        const container = document.getElementById('slotsContainer');
        container.innerHTML = '';

        slotsData.forEach(slot => {
            container.appendChild(renderSlot(slot));
        });
    }

    // ================== LOGIN ==================
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const uid = document.getElementById('uid').value;
        const password = document.getElementById('password').value;

        const result = await apiCall('login', { uid, password });

        if (!result || !result.success) {
            showError(result?.message || 'Login gagal');
            return;
        }

        currentUser = result.user;
        currentWeekStart = new Date().toISOString().slice(0, 10);

        hideError();
        showView('mainView');
        loadWeeklyData();
    });

    // ================== LOGOUT ==================
    document
        .getElementById('logoutBtn')
        .addEventListener('click', () => {
            currentUser = null;
            currentWeekStart = null;
            slotsData = [];

            document.getElementById('loginForm').reset();
            hideError();
            showView('loginView');
        });

    // ================== INITIAL LOAD ==================
    showView('loginView');
</script>

</body>
</html>
