<!DOCTYPE html><html><head><title>Dashboard</title><script src='https://cdn.tailwindcss.com'></script></head><body class='p-6'><h1 class='text-xl font-bold mb-4'>Dashboard</h1><div id='stats' class='grid grid-cols-3 gap-4'></div><script src='assets/js/api.js'></script><script>fetch(API+'?action=dashboard').then(r=>r.json()).then(d=>stats.innerHTML=`<div class='p-4 bg-white'>Users ${d.users}</div><div class='p-4 bg-white'>Slots ${d.slots}</div><div class='p-4 bg-white'>Tasks ${d.tasks}</div>`)</script></body></html>
