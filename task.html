<!DOCTYPE html><html><head><title>Task</title><script src='https://cdn.tailwindcss.com'></script></head><body class='p-6'><h1 class='text-xl font-bold mb-4'>Create Task</h1><input id='title' class='border p-2 w-full mb-3' placeholder='Task title'><button onclick='save()' class='bg-blue-600 text-white px-4 py-2 rounded'>Save</button><script src='assets/js/api.js'></script><script>const slot=new URLSearchParams(location.search).get('slot');function save(){api({action:'createTask',email:localStorage.email,title:title.value,slotId:slot}).then(()=>alert('Saved'))}</script></body></html>
